<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title th:text="${currencyModel.name}">Валюта</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
</head>
<body>

<div th:insert="fragments/navbar :: navbar"></div>

<div class="currency-chart-container">
  <h3>
    <a th:href="@{/currency/{name}(name=${currencyModel.name})}" th:text="${currencyModel.name}"></a>
  </h3>
  <div class="currency-chart">
    <canvas th:attr="id='chart-' + ${currencyModel.name}" height="280"></canvas>
    <div class="currency-price">
      <p>Цена: <span th:text="${price}"></span> $</p>
    </div>
  </div>
  <div class="currency-indicators-grid">
    <div class="indicator-chart-block">
      <h4>MACD</h4>
      <canvas th:attr="id='macd-chart-' + ${currencyModel.name}" height="140"></canvas>
    </div>
    <div class="indicator-chart-block">
      <h4>Осцилляторы (RSI / WR / StochRSI / KDJ)</h4>
      <canvas th:attr="id='osc-chart-' + ${currencyModel.name}" height="140"></canvas>
    </div>
  </div>
  <div class="indicator-cards" th:attr="id='metric-cards-' + ${currencyModel.name}"></div>
  <div class="currency-buttons">
    <form th:action="@{/transaction/create}" method="get">
      <input type="hidden" name="typeOpp" value="1">
      <input type="hidden" name="currencyName" th:value="${currencyModel.getName()}">
      <button class="currency-button buy" th:text="'Купить ' + ${currencyModel.name}"></button>
    </form>
    <form th:action="@{/transaction/create}" method="get">
      <input type="hidden" name="typeOpp" value="0">
      <input type="hidden" name="currencyName" th:value="${currencyModel.getName()}">
      <button class="currency-button sell" th:text="'Продать ' + ${currencyModel.name}"></button>
    </form>
  </div>
</div>

<script th:inline="javascript">
  var currency = /*[[${currencyModel}]]*/ {};
  var indicators = /*[[${indicators}]]*/ {};

  const labels = indicators.labels || [];
  const closePrices = indicators.closePrices || [];
  const ma = indicators.ma || [];
  const ema = indicators.ema || [];
  const bollUpper = indicators.bollUpper || [];
  const bollLower = indicators.bollLower || [];
  const sar = indicators.sar || [];
  const macdLine = indicators.macd || [];
  const macdSignal = indicators.macdSignal || [];
  const macdHistogram = indicators.macdHistogram || [];
  const rsi = indicators.rsi || [];
  const wr = indicators.wr || [];
  const stochRsiK = indicators.stochRsiK || [];
  const stochRsiD = indicators.stochRsiD || [];
  const kdjK = indicators.kdjK || [];
  const kdjD = indicators.kdjD || [];
  const kdjJ = indicators.kdjJ || [];

  const mainCtx = document.getElementById('chart-' + currency.name).getContext('2d');
  new Chart(mainCtx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: `Курс ${currency.name}`,
          data: closePrices,
          borderColor: '#2c3e50',
          borderWidth: 2,
          fill: false,
          pointRadius: 0
        },
        {
          label: 'MA(20)',
          data: ma,
          borderColor: '#3498db',
          borderWidth: 1.5,
          pointRadius: 0
        },
        {
          label: 'EMA(20)',
          data: ema,
          borderColor: '#8e44ad',
          borderWidth: 1.5,
          pointRadius: 0
        },
        {
          label: 'BOLL Upper',
          data: bollUpper,
          borderColor: '#16a085',
          borderWidth: 1,
          pointRadius: 0
        },
        {
          label: 'BOLL Lower',
          data: bollLower,
          borderColor: '#16a085',
          borderWidth: 1,
          pointRadius: 0
        },
        {
          label: 'SAR',
          data: sar,
          borderColor: '#e67e22',
          borderWidth: 0,
          showLine: false,
          pointRadius: 2
        }
      ]
    },
    options: {
      maintainAspectRatio: false,
      scales: {
        x: {
          type: 'time',
          time: {
            unit: 'minute',
            tooltipFormat: 'yyyy-MM-dd HH:mm'
          }
        },
        y: {
          beginAtZero: false
        }
      }
    }
  });

  const macdCtx = document.getElementById('macd-chart-' + currency.name).getContext('2d');
  new Chart(macdCtx, {
    data: {
      labels: labels,
      datasets: [
        {
          type: 'line',
          label: 'MACD',
          data: macdLine,
          borderColor: '#2980b9',
          borderWidth: 1.5,
          pointRadius: 0
        },
        {
          type: 'line',
          label: 'Signal',
          data: macdSignal,
          borderColor: '#c0392b',
          borderWidth: 1.2,
          pointRadius: 0
        },
        {
          type: 'bar',
          label: 'Histogram',
          data: macdHistogram,
          backgroundColor: macdHistogram.map(v => (v || 0) >= 0 ? 'rgba(39, 174, 96, 0.55)' : 'rgba(231, 76, 60, 0.55)'),
          borderWidth: 0
        }
      ]
    },
    options: {
      maintainAspectRatio: false,
      scales: {
        x: {display: false},
        y: {beginAtZero: true}
      }
    }
  });

  const oscCtx = document.getElementById('osc-chart-' + currency.name).getContext('2d');
  new Chart(oscCtx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {label: 'RSI', data: rsi, borderColor: '#2c3e50', pointRadius: 0, borderWidth: 1.2},
        {label: 'WR', data: wr, borderColor: '#7f8c8d', pointRadius: 0, borderWidth: 1.2},
        {label: 'StochRSI %K', data: stochRsiK, borderColor: '#27ae60', pointRadius: 0, borderWidth: 1.2},
        {label: 'StochRSI %D', data: stochRsiD, borderColor: '#f39c12', pointRadius: 0, borderWidth: 1.2},
        {label: 'K', data: kdjK, borderColor: '#8e44ad', pointRadius: 0, borderWidth: 1.2},
        {label: 'D', data: kdjD, borderColor: '#d35400', pointRadius: 0, borderWidth: 1.2},
        {label: 'J', data: kdjJ, borderColor: '#e74c3c', pointRadius: 0, borderWidth: 1.2}
      ]
    },
    options: {
      maintainAspectRatio: false,
      scales: {
        x: {display: false},
        y: {beginAtZero: false}
      }
    }
  });

  const latest = indicators.latest || {};
  renderMetricCards(currency.name, {
    MA: latest.ma,
    EMA: latest.ema,
    BOLL: latest.boll,
    SAR: latest.sar,
    MAVOL: latest.mavol,
    MACD: latest.macd,
    KDJ: latest.kdj,
    RSI: latest.rsi,
    WR: latest.wr,
    StochRSI: latest.stochRsi
  });

  function renderMetricCards(currencyName, metrics) {
    const container = document.getElementById('metric-cards-' + currencyName);
    const cards = [
      ['MA', metrics.MA],
      ['EMA', metrics.EMA],
      ['BOLL (L/M/U)', metrics.BOLL],
      ['SAR', metrics.SAR],
      ['MAVOL', metrics.MAVOL],
      ['MACD (M/S/H)', metrics.MACD],
      ['KDJ (K/D/J)', metrics.KDJ],
      ['RSI', metrics.RSI],
      ['WR', metrics.WR],
      ['StochRSI (%K/%D)', metrics.StochRSI]
    ];
    container.innerHTML = cards.map(([name, value]) => (
      '<div class="indicator-card">' +
      '<div class="indicator-name">' + name + '</div>' +
      '<div class="indicator-value">' + formatMetric(value) + '</div>' +
      '</div>'
    )).join('');
  }

  function formatMetric(value) {
    if (value === null || value === undefined) {
      return 'n/a';
    }
    if (Array.isArray(value)) {
      return value.map(formatNumber).join(' / ');
    }
    return formatNumber(value);
  }

  function formatNumber(value) {
    if (value === null || value === undefined || Number.isNaN(value)) {
      return 'n/a';
    }
    const abs = Math.abs(value);
    const fractionDigits = abs >= 100 ? 2 : abs >= 1 ? 4 : 6;
    return Number(value).toLocaleString('ru-RU', {maximumFractionDigits: fractionDigits});
  }
</script>
</body>
</html>
