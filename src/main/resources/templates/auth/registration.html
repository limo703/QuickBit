<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .register-container {
      background-color: #fff;
      padding: 2em;
      border-radius: 10px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    .register-container h2 {
      text-align: center;
      margin-bottom: 2em;
      color: #333;
    }
    .form-group {
      margin-bottom: 1.5em;
    }
    .form-group label {
      display: block;
      margin-bottom: .5em;
      color: #555;
      font-weight: bold;
    }
    .form-group input {
      width: 100%;
      padding: .8em;
      font-size: 1em;
      border: 1px solid #ddd;
      border-radius: 5px;
      transition: border-color 0.3s;
    }
    .form-group input:focus {
      border-color: #202020;
      outline: none;
    }
    .form-group button {
      width: 100%;
      padding: 1em;
      background-color: #202020;
      color: #fff;
      font-size: 1.1em;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .form-group button:hover {
      background-color: #404040;
    }
    .form-group a {
      display: block;
      margin-top: 1em;
      text-align: center;
      color: #007BFF;
      text-decoration: none;
    }
    .form-group a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="register-container">
  <h2>Регистрация</h2>
  <form th:action="@{/auth/registration}" th:method="post" th:object="${createUserForm}">

    <input type="hidden" name="_csrf" th:value="${_csrf.token}">

    <div class="form-group">
      <label for="username">Имя пользователя</label>
      <input type="text" id="username" name="username" th:field="*{username}" placeholder="Логин" required>
      <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Ошибка</div>
    </div>
    <div class="form-group">
      <label for="email">Электронная почта</label>
      <input type="email" id="email" name="email" th:field="*{email}" placeholder="Email" required>
      <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Ошибка</div>
    </div>
    <div class="form-group">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" th:field="*{password}" placeholder="Пароль" required>
      <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Ошибка</div>
    </div>
    <div class="form-group">
      <label for="confirmPassword">Повторите пароль</label>
      <input type="password" id="confirmPassword" th:field="*{confirmPassword}" name="confirmPassword" placeholder="Повторите пароль" required>
      <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}">Ошибка</div>
    </div>
    <div class="form-group">
      <button type="submit">Зарегистрироваться</button>
    </div>
    <div class="form-group">
      <a href="/auth/login">Уже есть аккаунт? Войти</a>
    </div>
  </form>
</div>
</body>
</html>
